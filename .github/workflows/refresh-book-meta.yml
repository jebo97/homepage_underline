name: Refresh book_meta (네이버 책 정보 갱신)

# 베스트셀러 아카이브(/archive)의 책 표지·소개를 주기적으로 갱신한다.
# 개정판·리커버 등으로 바뀐 정보를 반영하기 위해 --refresh(매칭 성공 시에만 갱신,
# 일시적 실패 시 기존 정보 보존) 모드로 전체 제목을 재조회한다.

on:
  schedule:
    # 매월 1일 18:00 UTC = 매월 2일 03:00 KST (cron 은 UTC 기준)
    - cron: "0 18 1 * *"
  workflow_dispatch: {}   # 수동 실행 버튼

# 동시 실행 방지
concurrency:
  group: refresh-book-meta
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install supabase

      - name: Refresh book_meta (네이버 재조회)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python .github/scripts/enrich_book_meta.py --refresh

      - name: Compute stats (저자 집계 등)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python .github/scripts/compute_stats.py
